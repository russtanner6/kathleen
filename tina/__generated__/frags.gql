fragment HomeParts on Home {
  __typename
  meta {
    __typename
    title
    description
  }
  blocks {
    __typename
    ... on HomeBlocksHero {
      hidden
      logoImage
      backgroundImage
      title
      subtitle
    }
    ... on HomeBlocksAbout {
      hidden
      number
      label
      heading
      image
      paragraphs
    }
    ... on HomeBlocksOfferings {
      hidden
      number
      label
      heading
      body
      cards {
        __typename
        number
        icon
        title
        description
        cta
      }
    }
    ... on HomeBlocksWholeness {
      hidden
      number
      label
      heading
      intro
      quote
      body
      ctaText
    }
    ... on HomeBlocksEarthStrip {
      hidden
      elements {
        __typename
        icon
        label
      }
    }
    ... on HomeBlocksTestimonials {
      hidden
      number
      label
      heading
      items {
        __typename
        quote
        author
      }
    }
    ... on HomeBlocksCreations {
      hidden
      number
      label
      heading
      items {
        __typename
        visual
        iconKey
        title
        description
      }
    }
    ... on HomeBlocksTagline {
      hidden
      text
    }
    ... on HomeBlocksContact {
      hidden
      number
      label
      heading
      email
      formspreeId
      socialLinks {
        __typename
        label
        url
      }
    }
  }
}

fragment SiteSettingsParts on SiteSettings {
  __typename
  brand
  copyright
  navLinks {
    __typename
    hidden
    label
    href
  }
  navFooterLinks {
    __typename
    label
    url
  }
}

fragment PostParts on Post {
  __typename
  title
  date
  author
  excerpt
  featuredImage
  body
}
